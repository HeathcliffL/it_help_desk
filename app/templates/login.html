{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<h1>Login</h1>
<form method="post">
  <label>Email</label>
  <input name="email" type="email" required>

  <label>Password</label>
  <input name="password" type="password" required>

  <button type="submit">Login</button>
</form>
{% endblock %}
